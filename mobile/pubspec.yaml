name: resident_portal_mobile
description: Resident Portal wrapper app for Rentvine with native notifications.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.10.11
  webview_flutter_wkwebview: ^3.15.0
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  package_info_plus: ^8.0.2
  uuid: ^4.5.1
  http: ^1.2.2
  url_launcher: ^6.3.1
  file_picker: ^8.1.2
  app_links: ^6.3.2
  local_auth: ^2.3.0
  in_app_review: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icons/coastal_logo_resized.png
